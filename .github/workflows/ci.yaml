# ──────────────────────────────────────────────
# .github/workflows/ci.yaml
# GitHub Actions CI 파이프라인
# 트리거: main 브랜치 push 시 자동 실행
#
# 사전 준비: Infra/07_deploy_app.sh 실행 시 자동 등록됨
#   Variables: AWS_ACCOUNT_ID, AWS_REGION, ECR_REPOSITORY, MANIFESTS_REPO
#   Secrets: MANIFESTS_TOKEN (PAT)
# ──────────────────────────────────────────────
name: CI - Build and Push to ECR

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  IMAGE_TAG: ${{ github.sha }}  # 커밋 SHA를 이미지 태그로 사용 (고유성 보장)

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    # IAM Role 기반 인증 (액세스 키 불필요)
    permissions:
      id-token: write
      contents: read

    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. AWS 인증 (OIDC - 액세스 키 없이 IAM Role로 인증)
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      # 3. ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Docker 이미지 빌드 및 ECR push
      - name: Build and push Docker image
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                     $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

      # 5. manifests 레포의 image tag 자동 업데이트
      #    ArgoCD가 이 변경을 감지하여 EKS에 자동 배포
      - name: Update image tag in manifests repo
        run: |
          git clone https://x-access-token:${{ secrets.MANIFESTS_TOKEN }}@github.com/${{ vars.MANIFESTS_REPO }}.git manifests
          cd manifests

          # k8s/deployment.yaml의 image 태그를 새 커밋 SHA로 교체
          sed -i "s|image: .*$ECR_REPOSITORY.*|image: ${{ env.IMAGE }}|g" k8s/deployment.yaml

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "chore: update image tag to $IMAGE_TAG [skip ci]"
          git push
