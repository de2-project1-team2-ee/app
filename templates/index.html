<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>핫딜 쿠폰</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; justify-content: center; align-items: center; }

    .card { background: #fff; border-radius: 16px; padding: 48px 40px; max-width: 440px; width: 90%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; }
    .badge { display: inline-block; background: #fff3e0; color: #e65100; padding: 4px 14px; border-radius: 99px; font-size: 13px; font-weight: 600; margin-bottom: 16px; }
    h1 { font-size: 28px; color: #1a1a1a; margin-bottom: 8px; }
    .desc { color: #666; font-size: 15px; margin-bottom: 32px; }

    .status-bar { display: flex; justify-content: space-between; background: #f8f9fa; border-radius: 10px; padding: 16px 20px; margin-bottom: 24px; }
    .status-item { text-align: center; }
    .status-label { font-size: 12px; color: #999; margin-bottom: 4px; }
    .status-value { font-size: 22px; font-weight: 700; color: #1a1a1a; }
    .status-value.open { color: #2e7d32; }
    .status-value.closed { color: #c62828; }

    .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 17px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .btn-claim { background: #1976d2; color: #fff; }
    .btn-claim:hover { background: #1565c0; }
    .btn-claim:disabled { background: #bdbdbd; cursor: not-allowed; }
    .btn-admin { background: #f5f5f5; color: #666; font-size: 14px; margin-top: 10px; font-weight: 500; }
    .btn-admin:hover { background: #e0e0e0; }

    .result { margin-top: 24px; padding: 16px; border-radius: 10px; font-size: 15px; display: none; }
    .result.success { background: #e8f5e9; color: #2e7d32; }
    .result.error { background: #fce4ec; color: #c62828; }
    .result .coupon-code { font-size: 24px; font-weight: 700; letter-spacing: 2px; margin-top: 8px; }

    .admin-panel { margin-top: 32px; padding-top: 24px; border-top: 1px solid #eee; }
    .admin-title { font-size: 12px; color: #999; margin-bottom: 10px; }
    .admin-btns { display: flex; gap: 8px; }
    .admin-btns .btn { flex: 1; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">HOTDEAL</div>
    <h1>할인 쿠폰 이벤트</h1>
    <p class="desc">선착순 한정 수량! 쿠폰을 수령하세요.</p>

    <div class="status-bar">
      <div class="status-item">
        <div class="status-label">전체</div>
        <div class="status-value" id="total">-</div>
      </div>
      <div class="status-item">
        <div class="status-label">잔여</div>
        <div class="status-value" id="remaining">-</div>
      </div>
      <div class="status-item">
        <div class="status-label">상태</div>
        <div class="status-value" id="event-status">-</div>
      </div>
    </div>

    <button class="btn btn-claim" id="claim-btn" onclick="claimCoupon()">쿠폰 수령하기</button>

    <div class="result" id="result"></div>

    <div class="admin-panel">
      <div class="admin-title">관리자</div>
      <div class="admin-btns">
        <button class="btn btn-admin" onclick="adminOpen()">이벤트 오픈</button>
        <button class="btn btn-admin" onclick="adminReset()">리셋</button>
      </div>
    </div>
  </div>

  <script>
    // 사용자 ID — 브라우저 세션 단위로 생성
    let userId = sessionStorage.getItem('userId');
    if (!userId) {
      userId = 'user-' + Math.random().toString(36).substring(2, 10);
      sessionStorage.setItem('userId', userId);
    }

    // ── 상태 폴링 ──
    async function fetchStatus() {
      try {
        const res = await fetch('/status');
        const json = await res.json();
        if (json.success) {
          document.getElementById('total').textContent = json.data.total;
          document.getElementById('remaining').textContent = json.data.remaining;
          const statusEl = document.getElementById('event-status');
          if (json.data.is_open) {
            statusEl.textContent = '진행중';
            statusEl.className = 'status-value open';
            document.getElementById('claim-btn').disabled = false;
          } else {
            statusEl.textContent = '대기';
            statusEl.className = 'status-value closed';
            document.getElementById('claim-btn').disabled = true;
          }
        }
      } catch (e) {
        console.error('상태 조회 실패:', e);
      }
    }

    // ── 쿠폰 수령 ──
    async function claimCoupon() {
      const btn = document.getElementById('claim-btn');
      const result = document.getElementById('result');
      btn.disabled = true;
      btn.textContent = '처리 중...';

      try {
        const res = await fetch('/coupon', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-User-Id': userId },
          body: JSON.stringify({ user_id: userId }),
        });
        const json = await res.json();

        result.style.display = 'block';
        if (json.success) {
          result.className = 'result success';
          result.innerHTML = `${json.data.message}<div class="coupon-code">${json.data.coupon_code}</div>`;
        } else {
          result.className = 'result error';
          result.textContent = json.error.message;
          // 매진/오픈전이 아닌 경우에만 버튼 복구
          if (json.error.code !== 'ALREADY_CLAIMED') {
            btn.disabled = false;
          }
        }
      } catch (e) {
        result.style.display = 'block';
        result.className = 'result error';
        result.textContent = '네트워크 오류가 발생했습니다';
        btn.disabled = false;
      }

      btn.textContent = '쿠폰 수령하기';
      fetchStatus();
    }

    // ── 관리자: 오픈 ──
    async function adminOpen() {
      const res = await fetch('/admin/open', { method: 'POST' });
      const json = await res.json();
      alert(json.success ? json.data.message : json.error.message);
      fetchStatus();
    }

    // ── 관리자: 리셋 ──
    async function adminReset() {
      if (!confirm('쿠폰을 리셋하시겠습니까?')) return;
      const res = await fetch('/admin/reset', { method: 'POST' });
      const json = await res.json();
      alert(json.success ? json.data.message : json.error.message);
      document.getElementById('result').style.display = 'none';
      document.getElementById('claim-btn').disabled = false;
      sessionStorage.removeItem('userId');
      userId = 'user-' + Math.random().toString(36).substring(2, 10);
      sessionStorage.setItem('userId', userId);
      fetchStatus();
    }

    // 3초마다 상태 갱신
    fetchStatus();
    setInterval(fetchStatus, 3000);
  </script>
</body>
</html>
