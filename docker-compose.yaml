version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hotdeal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sampledb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: changeme123!
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
